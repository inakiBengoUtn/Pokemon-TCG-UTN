spring.application.name=tcg

# Postgresql Connection
spring.datasource.url=jdbc:postgresql://localhost:5433/mydb?options=-c%20TimeZone%3DUTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis Connection
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database=postgresql
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security
security.jwt.secret=SANTOROAPROBAME
security.jwt.expires.access=72
security.jwt.expires.refresh=168
security.jwt.issuer=DOMINIO_WEB
