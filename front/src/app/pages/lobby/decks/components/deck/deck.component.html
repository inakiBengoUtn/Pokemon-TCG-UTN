<div class="deck-card" [class.selected]="isSelected" (click)="select($event)" role="button" tabindex="0">
  @if (isSelected) {
    <div class="select-badge" aria-label="Mazo seleccionado">
      <mat-icon class="badge-icon">check_circle</mat-icon>
    </div>
  }
  
  <div class="card-cover-container">
    <div class="card-cover" [style.background-image]="'url(' + deck.coverCardImage + ')'"></div>
  </div>

  <div class="card-info">
    <h3 class="deck-name">{{ deck.name }}</h3>
    <span class="deck-count">{{ deck.cardCount }} Cartas</span>
  </div>

  <div class="card-actions">
    <button mat-mini-fab class="action-btn edit-btn" (click)="edit($event)" aria-label="Editar mazo">
      <mat-icon>edit</mat-icon>
    </button>
    <button mat-mini-fab class="action-btn delete-btn" (click)="delete($event)" aria-label="Eliminar mazo">
      <mat-icon>delete</mat-icon>
    </button>
  </div>
</div>
